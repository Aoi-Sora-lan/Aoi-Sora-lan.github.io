	<script language="javascript" type="text/javascript">
    var n = 1;
	var speed=0;
	var bb=100;
    images = new Array;
	texts = new Array;
	images[1] = new Image();

	function swapPic(){
		briPic();
		if(n<=3){
		n++;
		}else{
		n=1;}
        document.xx.src = images[n].src;
		 document.getElementById("xxp").innerHTML=texts[n];
		setTimeout('debriPic()',4000);
	}
	function briPic(){
	if(bb<=100){
		bb=bb+1;
		document.getElementById("xxn").style.cssText="-webkit-filter: brightness("+bb+"%);filter: brightness("+bb+"%);";
		setTimeout('briPic()',20);
		}else{
		bb=100;
		document.getElementById("xxn").style.cssText="-webkit-filter: brightness("+bb+"%);filter: brightness("+bb+"%);";
		}
	}
	function debriPic(){
	if(bb>=40){
		bb=bb-1;
		document.getElementById("xxn").style.cssText="-webkit-filter: brightness("+bb+"%);filter: brightness("+bb+"%);";
		setTimeout('debriPic()',20);
		}else{
		swapPic();
		}
	}
	function runPic(){
	if(speed>=-200){
		speed=speed-5;
		document.getElementById("xxn").style.cssText="margin-left:"+speed+"px";
		setTimeout('runPic()',20);
		}
	}
  </script>
